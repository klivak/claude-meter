name: Deploy Project Website

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "assets/icon_app.png"
      - "screenshots/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        shell: bash
        run: |
          mkdir -p _site/assets _site/screenshots
          cp site/index.html site/styles.css site/app.js site/metrics.json _site/
          cp assets/icon_app.ico _site/assets/
          cp screenshots/dashboard-light-v5.1.png _site/screenshots/
          cp screenshots/dashboard-dark-v5.1.png _site/screenshots/
          cp screenshots/theme-sunset.png _site/screenshots/
          cp screenshots/theme-midnight.png _site/screenshots/
          touch _site/.nojekyll

      - name: Refresh public project metrics
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STARS=$(gh api repos/klivak/claude-meter --jq '.stargazers_count')
          OPEN_ISSUES=$(gh api repos/klivak/claude-meter --jq '.open_issues_count')
          LATEST_RELEASE=$(gh api repos/klivak/claude-meter/releases/latest --jq '.tag_name')
          printf '{\n  "stars": %s,\n  "openIssues": %s,\n  "latestRelease": "%s"\n}\n' \
            "$STARS" "$OPEN_ISSUES" "$LATEST_RELEASE" > _site/metrics.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
