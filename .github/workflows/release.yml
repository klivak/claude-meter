name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - name: Check version consistency
        shell: pwsh
        run: ./scripts/check-version.ps1

      - name: Build release
        run: cargo build --release

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate SHA-256 checksum
        id: checksum
        shell: pwsh
        run: |
          $checksum = (Get-FileHash target/release/claudemeter.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$checksum  claudemeter.exe" | Out-File target/release/claudemeter.exe.sha256 -Encoding ascii
          "sha256=$checksum" >> $env:GITHUB_OUTPUT

      - name: VirusTotal Scan
        if: env.VT_API_KEY != ''
        uses: crazy-max/ghaction-virustotal@v4
        id: virustotal
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            target/release/claudemeter.exe

      - name: Prepare release body
        id: body
        shell: bash
        run: |
          VT_ANALYSIS="${{ steps.virustotal.outputs.analysis }}"
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo 'SHA-256 (`claudemeter.exe`): `${{ steps.checksum.outputs.sha256 }}`' >> $GITHUB_OUTPUT
          if [ -n "$VT_ANALYSIS" ]; then
            VT_URL=$(echo "$VT_ANALYSIS" | cut -d'=' -f2-)
            echo "" >> $GITHUB_OUTPUT
            echo "---" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "VirusTotal Scan: [View full report](${VT_URL})" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClaudeMeter ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          append_body: true
          body: ${{ steps.body.outputs.release_body }}
          files: |
            target/release/claudemeter.exe
            target/release/claudemeter.exe.sha256

  release-macos:
    needs: release
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build macOS app bundle
        run: sh scripts/build-macos-app.sh

      - name: Notarize macOS app
        if: env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        run: |
          xcrun notarytool submit target/aarch64-apple-darwin/release/ClaudeMeter-macos-arm64.app.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Upload macOS binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/aarch64-apple-darwin/release/claudemeter-macos-arm64
            target/aarch64-apple-darwin/release/ClaudeMeter-macos-arm64.app.zip
