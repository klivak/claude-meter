name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: VirusTotal Scan
        if: env.VT_API_KEY != ''
        uses: crazy-max/ghaction-virustotal@v4
        id: virustotal
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            target/release/claudemeter.exe

      - name: Prepare release body
        id: body
        shell: bash
        run: |
          VT_ANALYSIS="${{ steps.virustotal.outputs.analysis }}"
          if [ -n "$VT_ANALYSIS" ]; then
            VT_URL=$(echo "$VT_ANALYSIS" | cut -d'=' -f2-)
            echo "vt_section<<EOF" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "---" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "VirusTotal Scan: [View full report](${VT_URL})" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "vt_section=" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClaudeMeter ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          append_body: true
          body: ${{ steps.body.outputs.vt_section }}
          files: |
            target/release/claudemeter.exe

  release-macos:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build macOS release
        run: cargo build --release --target aarch64-apple-darwin

      - name: Rename macOS binary
        run: cp target/aarch64-apple-darwin/release/claudemeter target/aarch64-apple-darwin/release/claudemeter-macos-arm64

      - name: Upload macOS binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/aarch64-apple-darwin/release/claudemeter-macos-arm64
