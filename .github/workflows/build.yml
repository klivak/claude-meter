name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudemeter-windows-x64
          path: target/release/claudemeter.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build app bundle
        run: sh scripts/build-macos-app.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudemeter-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/claudemeter-macos-arm64
            target/aarch64-apple-darwin/release/ClaudeMeter-macos-arm64.app.zip
